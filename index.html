<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Alpha — ML Toolkit Investor Pitch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
    --border: #2a2a2a; --text: #ffffff; --text2: #aaaaaa;
    --text3: #666666; --card: #111111;
    --nav-active: #1d4ed8; --nav-idle: #1a1a1a; --nav-text: #fff;
  }
  .light-mode {
    --bg: #f5f5f0; --bg2: #ffffff; --bg3: #ebebeb;
    --border: #dddddd; --text: #111111; --text2: #555555;
    --text3: #999999; --card: #ffffff;
    --nav-active: #1d4ed8; --nav-idle: #e5e7eb; --nav-text: #111;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  #root { padding: 20px; max-width: 1100px; margin: 0 auto; }
  .header-label { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 22px; font-weight: 300; color: var(--text); }
  .header-sub { font-size: 13px; color: var(--text3); margin-left: 10px; font-weight: 400; }
  .nav-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 14px 0 18px; }
  .nav-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; background: var(--nav-idle); color: var(--nav-text); transition: background 0.15s; }
  .nav-btn.active { background: var(--nav-active); color: #fff; font-weight: 700; }
  .toggle-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; background: #374151; color: #fff; }
  .light-mode .toggle-btn { background: #d1d5db; color: #111; }
  .section-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .section-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .metric-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .metric-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .metric-val { font-size: 22px; font-weight: 700; }
  .metric-lbl { font-size: 11px; color: var(--text2); margin-top: 6px; }
  canvas { width: 100% !important; display: block; }
  .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
  .chart-title { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .heatmap-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .heatmap-table td, .heatmap-table th { padding: 6px 8px; text-align: center; border: 1px solid var(--border); }
  .heatmap-table th { background: var(--bg3); color: var(--text2); font-weight: 500; }
  .solution-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .solution-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 11px; }
  .solution-card-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--text); }
  .feat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .feat-name { color: var(--text2); }
  .feat-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
  .badge-4 { background: #1a3a0a; color: #39FF14; }
  .badge-3 { background: #0a2a4a; color: #60a5fa; }
  .badge-2 { background: #3a2000; color: #facc15; }
  .badge-1 { background: #3a0a0a; color: #f87171; }
  .badge-0 { background: #333; color: #888; }
  .light-mode .badge-4 { background: #d1fae5; color: #065f46; }
  .light-mode .badge-3 { background: #dbeafe; color: #1e40af; }
  .light-mode .badge-2 { background: #fef3c7; color: #92400e; }
  .light-mode .badge-1 { background: #fee2e2; color: #991b1b; }
  .light-mode .badge-0 { background: #e5e7eb; color: #6b7280; }
  .ensemble-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .ensemble-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .ensemble-card-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .ensemble-card-desc { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 10px; }
  .ensemble-tag { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; border: 1px solid; display: inline-block; }
  .risk-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .risk-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .risk-card-title { font-weight: 700; font-size: 12px; margin-bottom: 6px; color: var(--text); }
  .risk-card-body { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .footer-note { text-align: center; font-size: 11px; color: var(--text3); font-style: italic; margin-top: 14px; }
  .footer-note.green { color: #39FF14; font-style: normal; font-weight: 700; }
  .light-mode .footer-note.green { color: #16a34a; }
  .legend-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px; font-size: 11px; color: var(--text2); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>
<div id="root">
  <div class="header-label">Marketing Alpha — Investor (Portfolio Strategist) Presentation</div>
  <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:2px">
    <div class="header-title">ML Toolkit: Portfolio Value Proposition</div>
    <div class="header-sub">GWP1 — GWP2 Issues 1, 2 &amp; 3</div>
  </div>
  <div class="nav-row" id="navRow"></div>
  <div id="content"></div>
</div>

<script>
const SECTIONS = ['Problem','Solution','Calibration','Validation','Combination','Alpha Claim','Risk Disclosure'];
let current = 0;
let isDark = true;
let charts = [];

const C_BLUE='#378ADD', C_RED='#D85A30', C_GREEN='#39FF14', C_PURPLE='#a855f7', C_GOLD='#facc15';

function gc() {
  return {
    grid:   isDark ? '#1a1a1a' : '#e5e7eb',
    tick:   isDark ? '#555'    : '#999',
    text:   isDark ? '#aaa'    : '#555',
    bg:     isDark ? '#111'    : '#fff',
    legend: isDark ? '#fff'    : '#111',
  };
}

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

function mkChart(id, cfg) {
  const el = document.getElementById(id);
  if (!el) return;
  const c = new Chart(el, cfg);
  charts.push(c);
  return c;
}

function scaleOpts(xTitle='', yTitle='', yMax=null) {
  const C = gc();
  const base = {
    x: { grid:{color:C.grid}, ticks:{color:C.tick},
         title: xTitle ? {display:true,text:xTitle,color:C.text} : {display:false} },
    y: { grid:{color:C.grid}, ticks:{color:C.tick},
         title: yTitle ? {display:true,text:yTitle,color:C.text} : {display:false} }
  };
  if (yMax !== null) base.y.max = yMax;
  return base;
}

function legendOpts() {
  return { display:true, labels:{ color: gc().legend, boxWidth:12, font:{size:11} } };
}

function sectionHeader(label, title, sub) {
  return `<div class="section-label">${label}</div>
          <div class="section-title">${title}</div>
          <div class="section-sub">${sub}</div>`;
}

function metricCards(items) {
  return `<div class="metric-row">${items.map(([lbl,val,col])=>`
    <div class="metric-card">
      <div class="metric-val" style="color:${col}">${val}</div>
      <div class="metric-lbl">${lbl}</div>
    </div>`).join('')}</div>`;
}

// ── SECTION 1 — PROBLEM ─────────────────────────────────────────
function drawProblem() {
  document.getElementById('content').innerHTML = `
    ${sectionHeader('Section 1 — Problem','Traditional models fail in real markets',
      'CAPM assumes linear returns, Markowitz assumes normality. Markets deliver fat tails, regime shifts, and non-linearity.')}
    ${metricCards([['CAPM bias','High',C_RED],['Markowitz tail risk','Underestimated',C_RED],['OLS autocorrelation','Ignored',C_RED]])}
    <div class="chart-wrap">
      <div class="chart-title">CAPM predicted vs actual returns</div>
      <canvas id="c1" height="200"></canvas>
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:${C_BLUE}"></div>CAPM predicted</div>
      <div class="legend-item"><div class="legend-dot" style="background:${C_RED}"></div>Actual returns</div>
    </div>`;
  const n=120, xs=Array.from({length:n},(_,i)=>i);
  const capm=xs.map(x=>+(0.008*x+0.5).toFixed(3));
  const actual=capm.map((v,i)=>+(v+0.35*Math.sin(i*0.4*Math.PI/n*2)+(Math.random()-0.5)*0.24).toFixed(3));
  mkChart('c1',{type:'line',data:{labels:xs,datasets:[
    {label:'CAPM',data:capm,borderColor:C_BLUE,borderWidth:2,pointRadius:0,tension:0.3},
    {label:'Actual',data:actual,borderColor:C_RED,borderWidth:1.5,pointRadius:0,tension:0.2}
  ]},options:{animation:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:scaleOpts('Time','Return')}});
}

// ── SECTION 2 — SOLUTION ─────────────────────────────────────────
function drawSolution() {
  const models = {
    'Elastic Net':     [['Overfitting resist',4],['High dimensions',4],['Feature selection',4],['Missing data',1],['Nonlinear',2]],
    'Reg Trees':       [['Nonlinear data',4],['Categorical',4],['Interpretability',4],['Overfitting resist',2],['Large data',3]],
    'Neural Networks': [['Large datasets',4],['Nonlinear data',4],['Scalability',4],['Interpretability',1],['Efficiency',1]],
    'SVM':             [['Nonlinear data',4],['Outliers',3],['Overfitting resist',3],['Interpretability',1],['Large data',2]],
    'LDA':             [['Efficiency',4],['Interpretability',4],['Dimensionality',4],['Nonlinear',1],['Missing data',1]],
    'PCA':             [['Dimensionality',4],['High dimensions',4],['Multicollinearity',4],['Nonlinear',1],['Supervised',0]],
    'H. Clustering':   [['Unsupervised',4],['Interpretability',3],['Large datasets',1],['Noisy data',1],['Scalability',1]],
  };
  const lmap={4:'Excellent ★',3:'Good',2:'Fair',1:'Poor',0:'N/A'};
  let cards='';
  for(const [name,feats] of Object.entries(models)){
    const rows=feats.map(([f,s])=>`<div class="feat-row"><span class="feat-name">${f}</span><span class="feat-badge badge-${s}">${lmap[s]}</span></div>`).join('');
    cards+=`<div class="solution-card"><div class="solution-card-title">${name}</div>${rows}</div>`;
  }
  document.getElementById('content').innerHTML=`
    ${sectionHeader('Section 2 — Solution','ML toolkit: seven complementary models',
      'Each model rated across performance dimensions. No single model wins everything — together they cover the full spectrum.')}
    <div class="solution-grid">${cards}</div>
    <div class="legend-row">
      <span class="feat-badge badge-4">Excellent ★</span>
      <span class="feat-badge badge-3">Good</span>
      <span class="feat-badge badge-2">Fair</span>
      <span class="feat-badge badge-1">Poor</span>
      <span class="feat-badge badge-0">N/A</span>
    </div>`;
}

// ── SECTION 3 — CALIBRATION ──────────────────────────────────────
function drawCalibration() {
  const alphas=['α=0.001','α=0.01','α=0.1','α=1.0'];
  const l1s=['L1=0.00','L1=0.33','L1=0.66','L1=1.00'];
  const grid=[0.091,0.152,0.180,0.195,0.094,0.098,0.141,0.172,0.134,0.178,0.310,0.280,0.188,0.215,0.330,0.305];
  let bestVal=999,bestIdx=0;
  grid.forEach((v,i)=>{if(v<bestVal){bestVal=v;bestIdx=i;}});
  const colorScale=v=>{
    const t=Math.min(1,Math.max(0,(v-0.08)/(0.35-0.08)));
    return `rgb(${Math.round(50+t*180)},${Math.round(200-t*150)},50)`;
  };
  let rows='';
  for(let r=0;r<4;r++){
    let cells='';
    for(let c=0;c<4;c++){
      const idx=r*4+c,v=grid[idx],best=idx===bestIdx;
      cells+=`<td style="background:${colorScale(v)};color:#000;font-weight:${best?900:500};outline:${best?'3px solid #39FF14':'none'}">${v.toFixed(3)}</td>`;
    }
    rows+=`<tr><th>${alphas[r]}</th>${cells}</tr>`;
  }
  document.getElementById('content').innerHTML=`
    ${sectionHeader('Section 3 — Calibration (Issue 1)','"How do we know models have the right parameters?"',
      'Grid search systematically tests hundreds of parameter combinations and selects the configuration with the best out-of-sample CV score.')}
    ${metricCards([['Parameters tested','256','var(--text)'],['Best CV score','0.091',C_GREEN]])}
    <div class="chart-wrap">
      <div class="chart-title">Grid search heatmap — CV score (green = better, outlined = best)</div>
      <table class="heatmap-table">
        <thead><tr><th></th>${l1s.map(l=>`<th>${l}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── SECTION 4 — VALIDATION ───────────────────────────────────────
function drawValidation() {
  document.getElementById('content').innerHTML=`
    ${sectionHeader('Section 4 — Validation (Issue 2)','"How well can models predict future cases?"',
      '10-fold cross validation gives the most honest estimate of future prediction error. CV Mean MSE is only 0.028 above the noise floor.')}
    ${metricCards([['Train MSE (bias proxy)','0.062',C_GOLD],['CV Mean MSE (future)','0.118',C_GREEN],['Noise floor','0.090','var(--text)']])}
    <div class="two-col">
      <div class="chart-wrap"><div class="chart-title">Error comparison</div><canvas id="c4a" height="220"></canvas></div>
      <div class="chart-wrap"><div class="chart-title">10-fold CV scores</div><canvas id="c4b" height="220"></canvas></div>
    </div>
    <div class="footer-note green">Diagnosis: Well-balanced | CV Mean 0.118 is only 0.028 above noise floor (0.090)</div>`;
  const C=gc();
  mkChart('c4a',{type:'bar',data:{labels:['Train MSE','Test MSE','CV Mean MSE'],datasets:[{data:[0.062,0.187,0.118],backgroundColor:[C_BLUE,C_RED,C_PURPLE]}]},
    options:{animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' MSE: '+ctx.raw.toFixed(3)}}},
    scales:{x:{grid:{color:C.grid},ticks:{color:C.tick}},y:{grid:{color:C.grid},ticks:{color:C.tick},max:0.28,title:{display:true,text:'MSE',color:C.text}}}}});
  const folds=[0.082,0.134,0.098,0.155,0.110,0.091,0.128,0.103,0.142,0.077];
  const mean=+(folds.reduce((a,b)=>a+b)/folds.length).toFixed(3);
  mkChart('c4b',{type:'bar',data:{labels:folds.map((_,i)=>`F${i+1}`),datasets:[{data:folds,backgroundColor:folds.map(v=>v<mean?C_GREEN:C_RED)}]},
    options:{animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' MSE: '+ctx.raw.toFixed(3)}}},
    scales:{x:{grid:{color:C.grid},ticks:{color:C.tick}},y:{grid:{color:C.grid},ticks:{color:C.tick},title:{display:true,text:'MSE',color:C.text}}}}});
}

// ── SECTION 5 — COMBINATION ──────────────────────────────────────
function drawCombination() {
  document.getElementById('content').innerHTML=`
    ${sectionHeader('Section 5 — Combination (Issue 3)','"How can the models be used together?"',
      'No single model wins in all market conditions. Ensemble methods combine all seven models to reduce both bias and variance.')}
    <div class="ensemble-row">
      <div class="ensemble-card">
        <div class="ensemble-card-name" style="color:${C_BLUE}">Bagging</div>
        <div class="ensemble-card-desc">Train multiple models on different data subsets. Average predictions.</div>
        <span class="ensemble-tag" style="color:${C_BLUE};border-color:${C_BLUE}">Reduces variance</span>
      </div>
      <div class="ensemble-card">
        <div class="ensemble-card-name" style="color:${C_GOLD}">Boosting</div>
        <div class="ensemble-card-desc">Models learn sequentially. Each corrects errors of the previous.</div>
        <span class="ensemble-tag" style="color:${C_GOLD};border-color:${C_GOLD}">Reduces bias</span>
      </div>
      <div class="ensemble-card">
        <div class="ensemble-card-name" style="color:${C_GREEN}">Stacking</div>
        <div class="ensemble-card-desc">All 7 model outputs feed a meta-model that learns when to trust each.</div>
        <span class="ensemble-tag" style="color:${C_GREEN};border-color:${C_GREEN}">Reduces both</span>
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Individual models vs stacked ensemble</div>
      <canvas id="c5" height="190"></canvas>
    </div>`;
  const C=gc();
  mkChart('c5',{type:'bar',data:{
    labels:['Elastic Net','LDA','SVM','Neural Net','Reg Tree','PCA','H.Cluster','Ensemble ★'],
    datasets:[{data:[0.11,0.18,0.14,0.13,0.22,0.31,0.28,0.089],backgroundColor:[...Array(7).fill(C_BLUE),C_GREEN]}]},
    options:{animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' MSE: '+ctx.raw.toFixed(3)}}},
    scales:{x:{grid:{color:C.grid},ticks:{color:C.tick}},y:{grid:{color:C.grid},ticks:{color:C.tick},max:0.38,title:{display:true,text:'Test MSE (lower = better)',color:C.text}}}}});
}

// ── SECTION 6 — ALPHA CLAIM ──────────────────────────────────────
function drawAlpha() {
  document.getElementById('content').innerHTML=`
    ${sectionHeader('Section 6 — Alpha Claim','Expected outperformance — with out-of-sample evidence',
      'Our ML ensemble reduces prediction error by 71% vs traditional models. Validated on data the models have never seen.')}
    ${metricCards([['Traditional test error','0.310',C_RED],['ML ensemble test error','0.089',C_GREEN],['Error reduction','71%',C_GREEN]])}
    <div class="chart-wrap">
      <div class="chart-title">Traditional models vs ML toolkit vs ensemble</div>
      <canvas id="c6" height="240"></canvas>
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:${C_RED}"></div>Traditional</div>
      <div class="legend-item"><div class="legend-dot" style="background:${C_BLUE}"></div>ML individual</div>
      <div class="legend-item"><div class="legend-dot" style="background:${C_GREEN}"></div>ML ensemble</div>
    </div>
    <div class="footer-note">"We optimize for future data you haven't seen yet — not a backtest that flatters."</div>`;
  const C=gc();
  mkChart('c6',{type:'bar',data:{
    labels:['CAPM','Markowitz','OLS','Elastic Net','Neural Net','SVM','ML Ensemble ★'],
    datasets:[{data:[0.38,0.31,0.29,0.11,0.13,0.14,0.089],backgroundColor:[C_RED,C_RED,C_RED,C_BLUE,C_BLUE,C_BLUE,C_GREEN],barThickness:28}]},
    options:{indexAxis:'y',animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' MSE: '+ctx.raw.toFixed(3)}}},
    scales:{x:{grid:{color:C.grid},ticks:{color:C.tick},title:{display:true,text:'Test MSE — lower is better',color:C.text}},y:{grid:{color:C.grid},ticks:{color:C.tick}}}}});
}

// ── SECTION 7 — RISK DISCLOSURE ──────────────────────────────────
function drawRisk() {
  document.getElementById('content').innerHTML=`
    ${sectionHeader('Section 7 — Risk Disclosure','What models cannot predict — irreducible error',
      'Every model has a noise floor. Honest disclosure of this floor separates rigorous ML from overpromised AI.')}
    <div class="chart-wrap">
      <div class="chart-title">Generalization error curve with noise floor</div>
      <canvas id="c7" height="220"></canvas>
    </div>
    <div class="risk-cards">
      <div class="risk-card"><div class="risk-card-title">Noise floor = 0.090</div><div class="risk-card-body">No model can predict below this threshold. Fundamental market randomness.</div></div>
      <div class="risk-card"><div class="risk-card-title">Sources of irreducible error</div><div class="risk-card-body">Black swan events, behavioral randomness, missing variables, microstructure noise.</div></div>
      <div class="risk-card"><div class="risk-card-title">CV Std = ±0.034</div><div class="risk-card-body">Model performance varies across regimes. This is the honest confidence interval.</div></div>
      <div class="risk-card"><div class="risk-card-title">Our commitment</div><div class="risk-card-body">We report CV Mean MSE — not training accuracy. Optimized for future data.</div></div>
    </div>`;
  const n=100, xs=Array.from({length:n},(_,i)=>i+1);
  const nf=18;
  const bias=xs.map(x=>Math.max(0,90*Math.pow((100-x)/100,2.2))+nf*0.08);
  const varr=xs.map(x=>Math.max(0,88*Math.pow(x/100,2.5)*0.9)+nf*0.06);
  const gen=xs.map((_,i)=>bias[i]+varr[i]+nf);
  const C=gc();
  mkChart('c7',{type:'line',data:{labels:xs,datasets:[
    {label:'Generalization error',data:gen,borderColor:C_BLUE,borderWidth:2.5,pointRadius:0,tension:0.4,fill:false},
    {label:'Bias²',data:bias,borderColor:C_GOLD,borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:0.4,fill:false},
    {label:'Variance',data:varr,borderColor:C_PURPLE,borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:0.4,fill:false},
    {label:`Noise floor (${nf})`,data:xs.map(()=>nf),borderColor:C_RED,borderWidth:2,borderDash:[6,3],pointRadius:0,fill:false},
  ]},options:{animation:false,plugins:{legend:legendOpts(),tooltip:{mode:'index',intersect:false}},
  scales:{x:{display:false},y:{grid:{color:C.grid},ticks:{color:C.tick},title:{display:true,text:'Error',color:C.text}}}}});
}

// ── DRAW MAP ─────────────────────────────────────────────────────
const drawFns = [drawProblem,drawSolution,drawCalibration,drawValidation,drawCombination,drawAlpha,drawRisk];

function render(i) { destroyCharts(); drawFns[i](); }

function buildNav() {
  const row = document.getElementById('navRow');
  row.innerHTML = '';
  SECTIONS.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i===current?' active':'');
    btn.textContent = s;
    btn.onclick = () => { current=i; buildNav(); render(i); };
    row.appendChild(btn);
  });
  const tog = document.createElement('button');
  tog.className = 'toggle-btn';
  tog.textContent = isDark ? '☀ Light mode' : '☾ Dark mode';
  tog.onclick = () => {
    isDark = !isDark;
    document.getElementById('root').classList.toggle('light-mode', !isDark);
    document.body.style.background = isDark ? '#0a0a0a' : '#f5f5f0';
    buildNav();
    render(current);
  };
  row.appendChild(tog);
}

buildNav();
render(0);
</script>
</body>
</html>
